# 聊天功能 (需要安装 PlaceholderAPI)
Enable: false
pure:
  # 是否启用 Pure 纯净模式。关闭后不会应用纯净聊天过滤，且玩家不能开启 /pure。
  enable: false
# 聊天格式，可以使用 minimessage 格式
# 若要使用原生颜色代码必须使用 § 而不是 &
format:
  - text: '[§c管理员§r] '
    permission: "minecraft.command.op"
  - text: '<%player_name%> $player_message$'

# 拥有此权限的玩家发送 minimessage 格式的消息将会得到解析
allow-minimessage-perm: "essd.chat.allow-use-minimessage"
cooldown: 2000 # 毫秒 (1s=1000ms)
max-length: 256
intercepting-identical-content: false
forbid-keywords:
  - "傻逼"
  - "fuck"
replace-words:
  - ["abc1", "abc"]
# 掩耳盗铃模式: 开启后若被拦截消息仍可以发送，但消息不会被广播，而是仅自己可见
# 同样作用于敏感词与重复消息拦截
self-deception-mode: false
mute:
  # 留空时使用此默认禁言时长，支持 30m / 1h / 7d / permanent
  default-duration: "permanent"
  # 1 或 block: 直接阻止发送
  # 2 或 self-deception: 消息看起来发出去了，但只对自己可见
  mode: "block"
  # 被禁言时额外禁止使用的命令，仅匹配主命令名
  blocked-commands:
    - "msg"
    - "tell"
    - "w"
    - "me"
