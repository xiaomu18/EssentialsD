name: EssentialsD
version: "2.3.11"
main: et.xiaomu.essentialsd.EssentialsD
api-version: "1.21"
description: Deer's Essentials Reloaded
authors: ["lunadeer", "xiaomu18"]
load: STARTUP
folia-supported: true

softdepend:
  - LuckPerms
  - PlaceholderAPI
  - AuthMe
  - ProtocolLib

permissions:
  essd.*:
    default: op
    children:
      essd.suicide: true
      essd.hat: true
      essd.showitem: true
      essd.skull: true
      essd.god: true
      essd.fly: true
      essd.fly.other: true
      essd.flyspeed: true
      essd.flyspeed.other: true
      essd.clear: true
      essd.clear.other: true
      essd.clear.offline: true
      essd.pure: true
      essd.purelist: true
      essd.sit: true
      essd.save: true
      essd.more: true
      essd.enderchest: true
      essd.tp.tpa: true
      essd.tp.tpahere: true
      essd.tp.tpacancel: true
      essd.tp.rtp: true
      essd.tp.back: true
      essd.inspect: true
      essd.inspect.write: true
      essd.inspect.offline: true
      essd.home: true
      essd.home.use-editor: true
      essd.setwarp: true
      essd.delwarp: true
      essd.warp: true
      essd.mute: true
      essd.unmute: true
      essd.kickall: true
      essd.vanish: true
      essd.vanish.other: true
      essd.vanish.see: true
      essd.vanish.chat: true
      essd.vanish.tpahere: true
      essd.control: true
      essd.heal: true
      essd.info: true
      essd.gamemode: true
      essd.gamemode.other: true
      essd.gamemode.survival: true
      essd.gamemode.creative: true
      essd.gamemode.adventure: true
      essd.gamemode.spectator: true
  essd.suicide:
    default: true
  essd.hat:
    default: true
  essd.showitem:
    default: true
  essd.skull:
    default: true
  essd.god:
    default: op
  essd.fly:
    default: op
  essd.fly.other:
    default: false
  essd.flyspeed:
    default: op
  essd.flyspeed.other:
    default: false
  essd.clear:
    default: op
  essd.clear.other:
    default: false
  essd.clear.offline:
    default: op
  essd.pure:
    default: false
  essd.purelist:
    default: false
  essd.sit:
    default: true
  essd.save:
    default: op
  essd.more:
    default: op
  essd.enderchest:
    default: true
  essd.tp.tpa:
    default: true
  essd.tp.tpahere:
    default: true
  essd.tp.tpacancel:
    default: true
  essd.tp.rtp:
    default: true
  essd.tp.back:
    default: true
  essd.inspect:
    default: op
  essd.inspect.write:
    default: op
  essd.inspect.offline:
    default: op
  essd.home:
    default: true
  essd.home.use-editor:
    default: op
  essd.setwarp:
    default: op
  essd.delwarp:
    default: op
  essd.warp:
    default: true
  essd.mute:
    default: op
  essd.unmute:
    default: op
  essd.kickall:
    default: op
  essd.vanish:
    default: op
  essd.vanish.other:
    default: false
  essd.vanish.see:
    default: op
  essd.vanish.chat:
    default: false
  essd.vanish.tpahere:
    default: false
  essd.control:
    default: op
  essd.heal:
    default: op
  essd.info:
    default: op
  essd.gamemode:
    default: op
  essd.gamemode.other:
    default: false
  essd.gamemode.survival:
    default: false
  essd.gamemode.creative:
    default: false
  essd.gamemode.adventure:
    default: false
  essd.gamemode.spectator:
    default: false

commands:
  suicide:
    description: Kill yourself
    usage: /suicide
    permission: essd.suicide
  hat:
    description: Put the item in your main hand on your head
    usage: /hat
    permission: essd.hat
  showitem:
    description: Show the item in your main hand
    usage: /showitem
    permission: essd.showitem
  skull:
    description: Get your player head
    usage: /skull
    permission: essd.skull
  god:
    description: Toggle god mode
    usage: /god [player]
    permission: essd.god
  fly:
    description: Toggle flight
    usage: /fly [player]
    permission: essd.fly
  flyspeed:
    description: Set fly speed
    usage: /flyspeed <reset|speed> [player]
    permission: essd.flyspeed
  clear:
    description: Clear a player's inventory or ender chest
    usage: /clear [player] [--ender] [--confirm]
    permission: essd.clear
  pure:
    description: Toggle pure chat mode
    usage: /pure
    permission: essd.pure
  purelist:
    description: Manage your pure chat list
    usage: /purelist <add|remove|clear|list> [player]
    permission: essd.purelist
  sit:
    description: Sit down in place
    usage: /sit
    permission: essd.sit
  save:
    description: Save the server
    usage: /save
    permission: essd.save
  more:
    description: Fill the held item stack
    usage: /more [amount]
    permission: essd.more
  enderchest:
    description: Open your ender chest
    usage: /enderchest
    permission: essd.enderchest
  tpa:
    description: Request teleport to another player
    usage: /tpa <player>
    permission: essd.tp.tpa
  tpahere:
    description: Request another player teleport to you
    usage: /tpahere <player>
    permission: essd.tp.tpahere
  tpacancel:
    description: Cancel all teleport requests initiated by you
    usage: /tpacancel
    permission: essd.tp.tpacancel
  rtp:
    description: Random teleport nearby
    usage: /rtp
    permission: essd.tp.rtp
  back:
    description: Return to your previous teleport location
    usage: /back
    permission: essd.tp.back
  inspect:
    description: Inspect a player's inventory
    usage: /inspect <player> [--ender]
    permission: essd.inspect
  home:
    description: Teleport to a home
    usage: /home [name]
    permission: essd.home
  homes:
    description: Show your home list
    usage: /homes [page]
    permission: essd.home
  sethome:
    description: Set a home
    usage: /sethome [name]
    permission: essd.home
  delhome:
    description: Delete a home
    usage: /delhome <name>
    permission: essd.home
  setwarp:
    description: Set a warp point
    usage: /setwarp <name>
    permission: essd.setwarp
  delwarp:
    description: Delete a warp point
    usage: /delwarp <name>
    permission: essd.delwarp
  warp:
    description: Teleport to a warp point
    usage: /warp <name>
    permission: essd.warp
  warps:
    description: Show the warp list
    usage: /warps [page]
    permission: essd.warp
  mute:
    description: Mute a player
    usage: /mute
    permission: essd.mute
  unmute:
    description: Unmute a player or IP
    usage: /unmute p [player] or /unmute ip [player/address]
    permission: essd.unmute
  kickall:
    description: Kick all players with a reason
    usage: /kickall <reason>
    permission: essd.kickall
  vanish:
    description: Toggle vanish mode
    usage: /vanish <list|on|off> [player]
    permission: essd.vanish
  gamemode:
    description: Set a player's game mode
    usage: /gamemode <survival|creative|adventure|spectator> [player]
    permission: essd.gamemode
  essd:
    description: EssentialsD control command
    usage: /essd <reload|version>
    permission: essd.control
  heal:
    description: Heal a player
    usage: /heal [player]
    permission: essd.heal
  info:
    description: Show online or offline player information
    usage: /info <player>
    permission: essd.info
  home-editor:
    description: Manage another player's homes
    usage: /home-editor <playerName> view/tp/remove (homeName)
    permission: essd.home.use-editor
